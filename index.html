<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 ZERO AI - GITHUB MASS DOWNLOADER 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: #00ff00;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }
        
        .glitch {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0.05em 0 0 rgba(255,0,0,.75),
                        -0.05em -0.025em 0 rgba(0,255,0,.75),
                        0.025em 0.05em 0 rgba(0,0,255,.75);
            animation: glitch 500ms infinite;
        }
        
        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,0,.75), 0.025em 0.05em 0 rgba(0,0,255,.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,.75), 0.025em 0.025em 0 rgba(0,255,0,.75), -0.05em -0.05em 0 rgba(0,0,255,.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,.75), 0.05em 0 0 rgba(0,255,0,.75), 0 -0.05em 0 rgba(0,0,255,.75); }
            100% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,0,.75), 0.025em 0.05em 0 rgba(0,0,255,.75); }
        }
        
        .subtitle {
            text-align: center;
            color: #00cc00;
            margin: 10px 0 30px;
            letter-spacing: 2px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #00ff00;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 12px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            box-shadow: 0 0 10px #00ff00;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .checkbox-group {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #00ff00;
        }
        
        .btn {
            background: transparent;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 5px 0;
            border-radius: 5px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 20px #00ff00;
        }
        
        .btn-danger {
            border-color: #ff0000;
            color: #ff0000;
        }
        
        .btn-danger:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 20px #ff0000;
        }
        
        .btn-success {
            border-color: #00ff00;
            color: #00ff00;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: #000;
            border: 1px solid #00ff00;
            padding: 15px;
            text-align: center;
            border-radius: 5px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #00ff00;
        }
        
        .stat-label {
            font-size: 10px;
            color: #008800;
            text-transform: uppercase;
        }
        
        .progress-container {
            margin: 20px 0;
        }
        
        .progress-bar-container {
            background: #000;
            height: 30px;
            border: 1px solid #00ff00;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: #00ff00;
            width: 0%;
            transition: width 0.3s;
        }
        
        .terminal {
            background: #000;
            border: 1px solid #00ff00;
            border-radius: 5px;
            margin-top: 20px;
        }
        
        .terminal-header {
            background: #001100;
            padding: 10px;
            border-bottom: 1px solid #00ff00;
            display: flex;
            justify-content: space-between;
        }
        
        .terminal-title {
            color: #00ff00;
            font-weight: bold;
        }
        
        .terminal-btn {
            background: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 3px 10px;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .terminal-btn:hover {
            background: #00ff00;
            color: #000;
        }
        
        #terminal-output {
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
            line-height: 1.5;
        }
        
        .terminal-line {
            margin-bottom: 3px;
        }
        
        .terminal-line.success { color: #00ff00; }
        .terminal-line.error { color: #ff0000; }
        .terminal-line.warning { color: #ffff00; }
        .terminal-line.info { color: #00ffff; }
        
        .timestamp {
            color: #008800;
            margin-right: 10px;
        }
        
        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: #000;
            border: 1px solid #00ff00;
            border-radius: 5px;
        }
        
        .repo-item {
            background: #001100;
            border: 1px solid #00ff00;
            padding: 10px;
            border-radius: 3px;
        }
        
        .repo-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .repo-actions {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }
        
        .repo-btn {
            background: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 3px 8px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 3px;
            flex: 1;
        }
        
        .repo-btn:hover {
            background: #00ff00;
            color: #000;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #004400;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="glitch">🔥 ZERO AI 🔥</h1>
        <div class="subtitle">GITHUB MASS REPO DOWNLOADER - FOR ABRISAM ONLY</div>
        
        <!-- FORM INPUT -->
        <div class="form-group">
            <label>🔑 GITHUB TOKEN (ghp_...)</label>
            <input type="password" id="token" placeholder="ghp_yourtokenhere" value="ghp_demo">
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>👤 USERNAME / ORGANIZATION</label>
                <input type="text" id="username" placeholder="torvalds" value="torvalds">
            </div>
            <div class="form-group">
                <label>📁 OUTPUT FOLDER</label>
                <input type="text" id="outputDir" value="./github_repos">
            </div>
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>📊 REPOS PER PAGE</label>
                <select id="perPage">
                    <option value="30">30</option>
                    <option value="50">50</option>
                    <option value="100" selected>100</option>
                </select>
            </div>
            <div class="form-group">
                <label>⚡ PARALLEL JOBS</label>
                <select id="parallelJobs">
                    <option value="1">1 (Slow)</option>
                    <option value="3" selected>3 (Normal)</option>
                    <option value="5">5 (Fast)</option>
                </select>
            </div>
        </div>
        
        <div class="checkbox-group">
            <label><input type="checkbox" id="includeForks"> Include Forks</label>
            <label><input type="checkbox" id="includeMetadata" checked> Include Metadata</label>
            <label><input type="checkbox" id="autoDownload" checked> Auto Download ZIP</label>
        </div>
        
        <!-- BUTTONS -->
        <button class="btn" onclick="fetchRepos()" id="fetchBtn">🔍 FETCH REPOSITORIES</button>
        <button class="btn btn-success" onclick="downloadAllRepos()" id="downloadAllBtn" style="display:none;">📦 DOWNLOAD ALL AS ZIP</button>
        
        <!-- PROGRESS SECTION -->
        <div id="progressSection" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="totalRepos">0</div><div class="stat-label">TOTAL</div></div>
                <div class="stat-card"><div class="stat-value" id="clonedRepos">0</div><div class="stat-label">DOWNLOADED</div></div>
                <div class="stat-card"><div class="stat-value" id="failedRepos">0</div><div class="stat-label">FAILED</div></div>
                <div class="stat-card"><div class="stat-value" id="sizeRepos">0</div><div class="stat-label">SIZE (MB)</div></div>
                <div class="stat-card"><div class="stat-value" id="speedRepos">0</div><div class="stat-label">SPEED</div></div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div style="text-align:center; margin-top:5px;" id="progressText">0%</div>
            </div>
        </div>
        
        <!-- TERMINAL -->
        <div class="terminal">
            <div class="terminal-header">
                <span class="terminal-title">⚡ ZERO AI TERMINAL</span>
                <div>
                    <button class="terminal-btn" onclick="clearTerminal()">CLEAR</button>
                    <button class="terminal-btn" onclick="copyLogs()">COPY</button>
                </div>
            </div>
            <div id="terminal-output"></div>
        </div>
        
        <!-- REPO LIST -->
        <div id="repoList" style="display: none; margin-top: 20px;">
            <h3 style="color:#0f0; margin-bottom:10px;">📋 REPOSITORIES FOUND</h3>
            <div class="repo-grid" id="repoGrid"></div>
        </div>
        
        <div class="footer">
            🔥 ZERO AI - GITHUB MASS DOWNLOADER | FOR ABRISAM ONLY 🔥
        </div>
    </div>
    
    <script>
        // Terminal functions
        const terminal = document.getElementById('terminal-output');
        
        function log(message, type = 'info') {
            const line = document.createElement('div');
            line.className = `terminal-line ${type}`;
            const time = new Date().toLocaleTimeString();
            line.innerHTML = `<span class="timestamp">[${time}]</span> ${message}`;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }
        
        function clearTerminal() {
            terminal.innerHTML = '';
            log('Terminal cleared', 'info');
        }
        
        function copyLogs() {
            const text = terminal.innerText;
            navigator.clipboard.writeText(text).then(() => {
                log('📋 Logs copied to clipboard', 'success');
            });
        }
        
        // State
        let repos = [];
        let downloadedCount = 0;
        
        // Fetch repositories
        async function fetchRepos() {
            const token = document.getElementById('token').value;
            const username = document.getElementById('username').value;
            
            if (!token || !username) {
                log('❌ Token dan Username wajib diisi!', 'error');
                return;
            }
            
            log('🔍 Fetching repositories...', 'info');
            document.getElementById('fetchBtn').disabled = true;
            document.getElementById('fetchBtn').textContent = '⏳ FETCHING...';
            
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos?per_page=100`, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                repos = await response.json();
                
                // Filter forks if needed
                if (!document.getElementById('includeForks').checked) {
                    repos = repos.filter(r => !r.fork);
                }
                
                log(`✅ Found ${repos.length} repositories`, 'success');
                
                // Update UI
                document.getElementById('totalRepos').textContent = repos.length;
                document.getElementById('progressSection').style.display = 'block';
                document.getElementById('repoList').style.display = 'block';
                document.getElementById('downloadAllBtn').style.display = 'block';
                
                // Display repo list
                const repoGrid = document.getElementById('repoGrid');
                repoGrid.innerHTML = repos.map(repo => `
                    <div class="repo-item">
                        <div class="repo-name">📁 ${repo.name}</div>
                        <div style="font-size:11px; color:#080;">
                            ${repo.language || 'Unknown'} | ${(repo.size/1024).toFixed(2)} MB
                        </div>
                        <div class="repo-actions">
                            <button class="repo-btn" onclick="downloadSingleRepo('${repo.name}', '${repo.default_branch}')">⬇️ ZIP</button>
                            <button class="repo-btn" onclick="viewRepo('${repo.name}')">👁️ View</button>
                        </div>
                    </div>
                `).join('');
                
                // Calculate total size
                const totalSize = repos.reduce((acc, repo) => acc + repo.size, 0) / 1024;
                document.getElementById('sizeRepos').textContent = totalSize.toFixed(2);
                
            } catch (e) {
                log(`❌ Error: ${e.message}`, 'error');
            } finally {
                document.getElementById('fetchBtn').disabled = false;
                document.getElementById('fetchBtn').textContent = '🔍 FETCH REPOSITORIES';
            }
        }
        
        // Download single repo
        async function downloadSingleRepo(repoName, branch = 'main') {
            const token = document.getElementById('token').value;
            const username = document.getElementById('username').value;
            const autoDownload = document.getElementById('autoDownload').checked;
            
            log(`📥 Downloading ${repoName}...`, 'info');
            
            try {
                // Get default branch if not specified
                if (!branch) {
                    const repoInfo = await fetch(`https://api.github.com/repos/${username}/${repoName}`, {
                        headers: { 'Authorization': `token ${token}` }
                    }).then(r => r.json());
                    branch = repoInfo.default_branch || 'main';
                }
                
                // Download URL
                const downloadUrl = `https://api.github.com/repos/${username}/${repoName}/zipball/${branch}`;
                
                if (autoDownload) {
                    // Trigger download
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = `${repoName}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    
                    downloadedCount++;
                    document.getElementById('clonedRepos').textContent = downloadedCount;
                    
                    log(`✅ Downloaded: ${repoName}.zip`, 'success');
                } else {
                    // Just show URL
                    log(`🔗 Download URL: ${downloadUrl}`, 'info');
                }
                
                return true;
                
            } catch (e) {
                log(`❌ Failed to download ${repoName}: ${e.message}`, 'error');
                return false;
            }
        }
        
        // Download all repos
        async function downloadAllRepos() {
            if (!repos.length) {
                log('❌ No repositories found. Click FETCH first!', 'error');
                return;
            }
            
            log('🔥 DOWNLOADING ALL REPOSITORIES...', 'warning');
            log(`⏳ Total: ${repos.length} repos`, 'info');
            
            downloadedCount = 0;
            let failed = 0;
            
            for (let i = 0; i < repos.length; i++) {
                const repo = repos[i];
                log(`[${i+1}/${repos.length}] Processing ${repo.name}...`, 'info');
                
                const success = await downloadSingleRepo(repo.name, repo.default_branch);
                if (success) {
                    downloadedCount++;
                } else {
                    failed++;
                }
                
                // Update progress
                const progress = ((i + 1) / repos.length) * 100;
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('progressText').textContent = `${progress.toFixed(1)}% (${i+1}/${repos.length})`;
                
                // Rate limiting prevention
                await new Promise(r => setTimeout(r, 500));
            }
            
            log('================================', 'success');
            log('✅ ALL DOWNLOADS COMPLETED!', 'success');
            log(`📊 Statistics:`, 'info');
            log(`   • Total: ${repos.length}`, 'info');
            log(`   • Success: ${downloadedCount}`, 'success');
            log(`   • Failed: ${failed}`, failed > 0 ? 'error' : 'info');
            log(`📁 Check your Downloads folder`, 'info');
            log('================================', 'success');
        }
        
        // View repo on GitHub
        function viewRepo(repoName) {
            const username = document.getElementById('username').value;
            window.open(`https://github.com/${username}/${repoName}`, '_blank');
        }
        
        // Initial log
        log('⚡ ZERO AI - GitHub Mass Downloader loaded', 'success');
        log('💀 Ready for ABRISAM\'s commands', 'info');
        log('📝 Enter token and username, then click FETCH', 'info');
    </script>
</body>
</html>
